<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unoludo</title>
    <link rel="stylesheet" href="./default.css">
</head>
<body>
    <main class="game-layout">
        <section class="left-panel">
            <h1>Unoludo</h1>
            <p id="current-player">Current Player: -</p>
            <p id="action-message">Select a card, then select one of your planes.</p>
            <div class="button-group">
                <button id="reset-demo">Reset Demo</button>
                <button id="show-track-demo">Move Blue to Track 0</button>
                <button id="show-home-demo">Move Blue to Home 0</button>
                <button id="draw-end-turn">Draw 1 & End Turn</button>
                <button id="cancel-action">Cancel Selection</button>
                <button id="open-help">Help</button>
            </div>
        </section>

        <section class="board-panel">
        <div class="board-wrapper" id="board-wrapper">
            <img class="board-image" src="./assets/img/Unoludo_Board.png" alt="Unoludo board">
            <div id="discard-layer"></div>
            <div id="piece-layer"></div>
        </div>
        </section>

        <section class="right-panel">
            <h2>Game Info</h2>
            <p id="top-discard">Top Discard: -</p>
            <p id="draw-count">Draw Pile: -</p>

            <h2>Log</h2>
            <ol id="game-log"></ol>
        </section>

        <section class="hand-panel">
            <h2>Your Hand</h2>
            <div id="hand-cards" class="hand-cards"></div>
        </section>
    </main>

    <div id="help-overlay" class="help-overlay hidden">
        <button id="close-help" class="help-close">×</button>

        <button id="help-prev" class="help-nav help-prev">‹</button>

        <div class="help-content">
            <img id="help-image" class="help-image" src="./assets/img/help1.png" alt="Unoludo help page">
            <p id="help-page-indicator" class="help-page-indicator">1 / 3</p>
        </div>

        <button id="help-next" class="help-nav help-next">›</button>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
