<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Board Position Picker</title>
    <style>
        body {
            margin: 0;
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
        }

        #wrapper {
            position: relative;
            width: min(90vw, 90vh);
            aspect-ratio: 1 / 1;
            margin: 24px auto;
            border: 2px solid white;
        }

        #board {
            width: 100%;
            height: 100%;
            display: block;
        }

        .point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #output {
            width: min(90vw, 90vh);
            margin: 16px auto;
            white-space: pre-wrap;
            background: #020617;
            padding: 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <img id="board" src="./assets/img/Unoludo_Board.png" alt="Unoludo board">
    </div>

    <pre id="output">Click board positions in order.</pre>

    <script>
        const wrapper = document.getElementById("wrapper");
        const output = document.getElementById("output");
        const points = [];

        wrapper.addEventListener("click", function (event) {
            const rect = wrapper.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 100;
            const y = ((event.clientY - rect.top) / rect.height) * 100;

            points.push({
                x: Number(x.toFixed(2)),
                y: Number(y.toFixed(2))
            });

            const dot = document.createElement("div");
            dot.className = "point";
            dot.style.left = x + "%";
            dot.style.top = y + "%";
            wrapper.appendChild(dot);

            output.textContent = JSON.stringify(points, null, 4);
        });
    </script>
</body>
</html>
